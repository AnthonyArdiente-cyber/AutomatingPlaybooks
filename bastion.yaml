#======================================================================================================================#
AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS CloudFormation Template for a single-instance bastion host'
#======================================================================================================================#
Parameters:
  AvailabilityZone:
    Type: AWS::EC2::AvailabilityZone::Name
  EnvironmentType:
    Description: "Specify which env to run in"
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - test
      - prod
  LatestAmiId:
    Type:  'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2'
  KeyName:
    Description: Name of an existing EC2 KeyPair for SSH
    Type: AWS::EC2::KeyPair::KeyName
#  VPC:
#    Type: String
#    Default: vpc-07ec9e08c8f210a84 #this is bad... another method should be explored...
#    Description: Voacrum VPC ID

#======================================================================================================================#

Mappings:
  EnvironmentTypeToInstanceType:
    dev:
      InstanceType: t2.nano
    test:
      InstanceType: t2.micro
    prod:
      InstanceType: t2.small

#======================================================================================================================#

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      InstanceTenancy: default
  InternetGateway:
    Type: AWS::EC2::InternetGateway
  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway
  Subnet10:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Ref AvailabilityZone
      VpcId: !Ref VPC
      CidrBlock: 10.0.10.0/24
      MapPublicIpOnLaunch: true
  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
  InternetRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGateway
    Properties:
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway
      RouteTableId: !Ref RouteTable
  Subnet10RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref RouteTable
      SubnetId: !Ref Subnet10

#=========================================================================================================================#
#                                      Response Playbook: Compromised Bastion Host
#
# 1) Identify
#    - Retrieve the Instance ID of the affected system. In this case we can look at "BastionInstance"
# 2) Contain
#    - Isolate the system from the network by switching the Security group in "BastionInstance" to IsoloatedSecurityGroup
# 3) Investigate
#    - Do NOT shut off or reset the system, we want to preserve the data being stored in the Instance's RAM
# 4) Eradicate
#    - Document, Terminate, Recover. Also rotate the Instance's Keys to ensure security.
#
#=========================================================================================================================#

  BastionInstance:
    Type: AWS::EC2::Instance
    Properties:
      AvailabilityZone: !Ref AvailabilityZone
      ImageId: !Ref LatestAmiId
      InstanceType:
        !FindInMap [EnvironmentTypeToInstanceType, !Ref EnvironmentType, InstanceType]
#==== Responsible for providing privs for SSH/port 22 access ====#
      SecurityGroups: 
        - !Ref 'InboundAccessSecurityGroup'
      KeyName: !Ref 'KeyName'

  InboundAccessSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Allow inbound tcp on SSH port"
      SecurityGroupIngress:
      - IpProtocol: tcp
        FromPort: 22
        ToPort: 22
        CidrIp: 0.0.0.0/0

  IsolatedSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Denies all inbound and outbound traffic for Incident Response containment"
      VpcId: !Ref VPC
      SecurityGroupIngress: [] # Explicitly empty to deny all incoming traffic
      SecurityGroupEgress: []  # Explicitly empty to override default open outbound rule

#======================================================================================================================#

Outputs:
  InstanceId:
    Description: InstanceId of the newly created EC2 instance
    Value: !Ref 'BastionInstance'
  URI:
    Description: URI that points to public SSH end point
    Value: !Sub ssh://${BastionInstance.PublicDnsName}

